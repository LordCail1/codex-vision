<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>codex-vision</title>
    <style>
      :root {
        --bg: #f3ede1;
        --ink: #17212b;
        --muted: #6e6a63;
        --panel: rgba(255, 250, 242, 0.88);
        --line: #c8bda8;
        --active: #1f9d74;
        --idle: #d6861c;
        --archived: #8c8f94;
        --orphaned: #d85050;
        --accent: #245c73;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(36, 92, 115, 0.15), transparent 30%),
          radial-gradient(circle at bottom right, rgba(31, 157, 116, 0.14), transparent 24%),
          linear-gradient(180deg, #f8f2e7 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "Aptos", "Segoe UI", "IBM Plex Sans", sans-serif;
      }

      header {
        padding: 20px 24px 10px;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: 0.02em;
      }

      header p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .workspace-banner {
        margin: 14px 24px 0;
        padding: 14px 16px;
        display: grid;
        gap: 8px;
        background: rgba(255, 250, 242, 0.78);
        border: 1px solid rgba(200, 189, 168, 0.9);
        border-radius: 18px;
        box-shadow: 0 14px 32px rgba(23, 33, 43, 0.06);
      }

      .workspace-banner strong {
        display: inline-block;
        margin-right: 8px;
      }

      .workspace-banner code {
        font-family: "IBM Plex Mono", "Cascadia Code", monospace;
        font-size: 0.95rem;
        word-break: break-word;
      }

      .workspace-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 14px 24px 18px;
        align-items: center;
      }

      button,
      label {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        padding: 9px 14px;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.95);
      }

      button.is-active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.9fr) minmax(300px, 0.9fr);
        gap: 18px;
        padding: 0 24px 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(200, 189, 168, 0.9);
        border-radius: 20px;
        box-shadow: 0 16px 40px rgba(23, 33, 43, 0.08);
        overflow: hidden;
      }

      .panel header {
        padding: 16px 18px 0;
      }

      .panel h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      #graph-shell {
        min-height: calc(100vh - 180px);
        overflow: auto;
        padding: 12px;
      }

      #graph {
        width: 100%;
        min-height: 600px;
      }

      .node {
        cursor: pointer;
      }

      .node rect {
        stroke-width: 1.5;
        rx: 16;
      }

      .node text {
        user-select: none;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
      }

      .dot.active { background: var(--active); }
      .dot.idle { background: var(--idle); }
      .dot.archived { background: var(--archived); }
      .dot.orphaned { background: var(--orphaned); }

      #details {
        padding: 16px 18px 22px;
      }

      #details dl {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 10px 12px;
        margin: 0;
      }

      #details dt {
        color: var(--muted);
        font-weight: 600;
      }

      #details dd {
        margin: 0;
        word-break: break-word;
      }

      #warnings {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid rgba(200, 189, 168, 0.8);
      }

      #warnings li {
        margin-bottom: 8px;
        color: var(--orphaned);
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        #graph-shell {
          min-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>codex-vision</h1>
      <p>Git-like lineage for local Codex sessions, live from your machine.</p>
    </header>
    <section id="workspace-banner" class="workspace-banner"></section>
    <section class="controls">
      <button id="scope-current" class="is-active" type="button">Current workspace</button>
      <button id="scope-all" type="button">All sessions</button>
      <label><input id="active-only" type="checkbox" /> Active only</label>
      <label><input id="show-archived" type="checkbox" checked /> Show archived</label>
      <div id="summary" class="status-pill"></div>
    </section>
    <main class="layout">
      <section class="panel">
        <header><h2>Session Graph</h2></header>
        <div id="graph-shell">
          <svg id="graph" viewBox="0 0 1600 900" preserveAspectRatio="xMinYMin meet"></svg>
        </div>
      </section>
      <aside class="panel">
        <header><h2>Session Details</h2></header>
        <div id="details"></div>
      </aside>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
